<section class="sec" style="padding-top:calc(var(--nav-h,84px) + clamp(50px,8vw,110px))">
  <div class="wrap">
    <div class="split">
      <div class="split__body">
        <p class="eyebrow reveal" style="margin-bottom:20px">Join the Bloodline</p>
        <h1 class="h1 reveal-line"><span>Get in touch</span></h1>
        <p class="lead reveal" style="margin:22px 0 34px">Early access to drops, restock alerts, and 10% off your first order. Or reach us directly — we answer every message.</p>
        <form data-form action="{{FORMSPREE_ACTION}}" method="POST" class="reveal">
          <input type="hidden" name="_subject" value="New SCCC inquiry">
          <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">
          <input type="hidden" name="product" id="reserve-product" value="">
          <div class="field"><input id="name" name="name" type="text" placeholder=" " required><label for="name">Name</label></div>
          <div class="field"><input id="email" name="email" type="email" placeholder=" " required><label for="email">Email</label></div>
          <div class="field"><textarea id="msg" name="message" placeholder=" "></textarea><label for="msg">Message (optional)</label></div>
          <button class="btn btn--solid" data-magnetic type="submit"><span>Send &amp; subscribe</span></button>
          <p class="form__status" role="status" aria-live="polite"></p>
        </form>
      </div>
      <div class="split__media reveal"><picture><source srcset="assets/product-guardian-hoodie.webp" type="image/webp"><img src="assets/product-guardian-hoodie.jpg" alt="SCCC" loading="lazy" width="1300" height="979"></picture></div>
    </div>
  </div>
</section>
