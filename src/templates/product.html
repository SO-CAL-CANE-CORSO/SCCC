<section class="wrap">
  <p class="kicker reveal" style="margin-bottom:26px"><a href="{{ROOT}}shop.html" style="color:var(--muted)">Shop</a> / {{NAME}}</p>
  <div class="pdp__grid">
    <div class="pdp__gallery">
      <picture>
        <source type="image/webp" srcset="{{ROOT}}assets/{{IMAGE}}-480.webp 480w, {{ROOT}}assets/{{IMAGE}}-800.webp 800w, {{ROOT}}assets/{{IMAGE}}-1300.webp 1300w" sizes="(min-width:1000px) 50vw, 100vw">
        <img src="{{ROOT}}assets/{{IMAGE}}-800.jpg" srcset="{{ROOT}}assets/{{IMAGE}}-480.jpg 480w, {{ROOT}}assets/{{IMAGE}}-800.jpg 800w, {{ROOT}}assets/{{IMAGE}}-1300.jpg 1300w" sizes="(min-width:1000px) 50vw, 100vw" alt="{{NAME}}" width="1300" height="{{IMG_HEIGHT}}" fetchpriority="high">
      </picture>
      <picture><source srcset="{{ROOT}}assets/story.webp" type="image/webp"><img src="{{ROOT}}assets/story.jpg" alt="SCCC campaign editorial" loading="lazy" width="1800" height="1200"></picture>
    </div>
    <div class="pdp__info">
      <div style="position:sticky;top:calc(var(--nav-h,84px) + 30px)">
        <p class="eyebrow reveal">Drop 001</p>
        <h1 class="h2 reveal" style="margin:14px 0 0">{{NAME}}</h1>
        <p class="pdp__price reveal">${{PRICE}}</p>
        <p class="pdp__desc reveal">{{DESC}}</p>
        <p class="kicker reveal" style="margin-bottom:10px">Size</p>
        <div class="sizes reveal" data-product="{{NAME}}">
{{SIZES_HTML}}
        </div>
        <div class="reveal" style="display:flex;gap:12px;flex-wrap:wrap">
          <a class="btn btn--solid" data-magnetic data-reserve href="{{ROOT}}contact.html?product={{SLUG}}"><span>Reserve this piece — ${{PRICE}}</span></a>
          <a class="btn btn--ghost" href="{{ROOT}}shop.html"><span>Keep shopping</span></a>
        </div>
        <div class="pdp__details">
          <details class="acc" open><summary>Details <span class="pl">+</span></summary><p>{{DETAILS}}</p></details>
          <details class="acc"><summary>Shipping &amp; returns <span class="pl">+</span></summary><p>{{SHIPPING}}</p></details>
          <details class="acc"><summary>Care <span class="pl">+</span></summary><p>{{CARE}}</p></details>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="sec"><div class="wrap">
  <div class="sec__head"><div><p class="eyebrow">More from the drop</p><h2 class="h2 reveal-line"><span>Complete the fit</span></h2></div></div>
  <div class="grid">
{{CROSS_SELL_GRID}}
  </div>
</div></section>
